<!DOCTYPE html>
<html lang="fr">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcul de Moyenne S2</title>
    <style>
        :root {
            --primary: #3a86ff;
            --secondary: #8338ec;
            --success: #06d6a0;
            --danger: #ef476f;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --border: #dee2e6;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--dark);
            line-height: 1.5;
        }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 15px;
        }
        
        .form-content {
            padding: 30px;
        }
        
        .input-group {
            margin-bottom: 24px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark);
            font-size: 14px;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(58, 134, 255, 0.1);
        }
        
        .module-section {
            margin-top: 32px;
            padding: 20px;
            background: var(--light);
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }
        
        .module-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .form-footer {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
        }
        
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-submit {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            min-width: 200px;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(58, 134, 255, 0.2);
        }
        
        .btn-cancel {
            background: white;
            color: var(--gray);
            border: 2px solid var(--border);
            min-width: 200px;
        }
        
        .btn-cancel:hover {
            background: var(--light);
            border-color: var(--gray);
        }
        
        .required::after {
            content: " *";
            color: var(--danger);
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            .form-footer {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
    </head>
     <body>
        <div class="container">
            <div class="header">
                <h1>Calcul moyenne S2</h1>
                <p>Entrez vos notes pour calcuer votre moyenne generale S2</p>
            </div>

                <form action="info2.php" method="GET" class="form-content">
                    <div class="input-group">
                        <label for="Nom" class="required">Votre Nom :</label>
                        <input type="text" name="Nom" required placeholder="Votre nom">
                    </div>

                    <div class="input-group">
                        <label for="Prenom" class="required">Votre Prénom :</label>
                        <input type="text" name="Prenom" required placeholder="Votre prénom">
                    </div>

                    <div class="module-section">
                <div class="module-title">BDA</div>
                <div class="grid">
                    <div class="input-group">
                        <label for="NT_cntrlBDA">Contrôle</label>
                        <input type="text" name="NT_cntrlBDA" placeholder="Note sur 20">
                    </div>
                    <div class="input-group">
                        <label for="NT_CCBDA">Contrôle Continue</label>
                        <input type="text" name="NT_CCBDA" placeholder="Note sur 20">
                    </div>
                </div>
            </div>
                
            <div class="module-section">
                <div class="module-title">MSR</div>
                <div class="grid">
                    <div class="input-group">
                        <label for="NT_cntrlMSR">Contrôle</label>
                        <input type="text" name="NT_cntrlMSR" placeholder="Note sur 20">
                    </div>
                    <div class="input-group">
                        <label for="NT_CCMSR">Contrôle Continue</label>
                        <input type="text" name="NT_CCMSR" placeholder="Note sur 20">
                    </div>
                </div>
            </div>

            <div class="module-section">
                <div class="module-title">PAR</div>
                <div class="grid">
                    <div class="input-group">
                        <label for="NT_cntrlPAR">Contrôle</label>
                        <input type="text" name="NT_cntrlPAR" placeholder="Note sur 20">
                    </div>
                </div>
            </div>

            <div class="module-section">
                <div class="module-title">PFE</div>
                <div class="grid">
                    <div class="input-group">
                        <label for="NT_cntrlPFE">Contrôle</label>
                        <input type="text" name="NT_cntrlPAR" placeholder="Note sur 20">
                    </div>
                </div>
            </div>

            <div class="form-footer">
                <button type="submit" class="btn btn-submit">
                    Calculer la moyenne
                </button>
                <button type="button" class="btn btn-cancel" onclick="window.location.href='index.html'">
                    Annuler
                </button>
            </div>

                </form>
        </div>
    </body>
</html>
